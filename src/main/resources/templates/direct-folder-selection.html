<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片预览系统 - 直接选择文件夹</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd8;
            --success: #34C759;
            --danger: #FF453A;
            --bg: #0a0a0f;
            --surface: rgba(21, 21, 32, 0.95);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), transparent),
                        var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 580px;
        }

        .header-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 36px;
            position: relative;
        }

        .title-wrapper {
            text-align: center;
        }

        .title {
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin: 0;
            line-height: 1.2;
        }

        .btn-close {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-size: 20px;
            font-weight: 300;
            cursor: pointer;
            transition: all 250ms cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 2px 8px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-close:hover {
            background: rgba(255, 69, 58, 0.25);
            border-color: rgba(255, 69, 58, 0.6);
            color: var(--danger);
            transform: scale(1.1);
            box-shadow: 
                0 4px 16px rgba(255, 69, 58, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .btn-close:active {
            transform: scale(0.95);
        }

        .content-area {
            text-align: center;
        }

        .description {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-primary {
            width: 100%;
            padding: 18px 32px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--success), #2ea352);
            color: #000000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease-out;
            box-shadow: 0 6px 20px rgba(52, 199, 89, 0.4);
            min-height: 52px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(52, 199, 89, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .card {
                padding: 32px 24px;
                border-radius: 20px;
                max-width: 100%;
            }

            .header-row {
                margin-bottom: 28px;
            }

            .title {
                font-size: 26px;
                letter-spacing: 0.05em;
            }

            .btn-logout {
                padding: 8px 16px;
                font-size: 13px;
            }

            .description {
                font-size: 14px;
                margin-bottom: 28px;
            }

            .btn-primary {
                padding: 16px 24px;
                font-size: 15px;
            }

            .switch-method {
                margin-top: 28px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }

            .card {
                padding: 24px 20px;
            }

            .title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header-row">
                <div class="title-wrapper">
                    <h1 class="title">图片预览系统</h1>
                </div>
                <button class="btn-close" onclick="location.href='/gallery'">×</button>
            </div>
            
            <div class="content-area">
                <p class="description">
                    点击下方按钮选择文件夹，系统将自动读取并显示图片。
                </p>
                
                <button type="button" class="btn-primary" onclick="directSelectFolder()">选择文件夹</button>
            </div>
        </div>
    </div>
    
    <script>
        async function directSelectFolder() {
            try {
                if (!('showDirectoryPicker' in window)) {
                    alert('您的浏览器不支持此功能，请更换为Chrome/Edge浏览器或使用手动输入路径方式');
                    return;
                }
                
                const directoryHandle = await window.showDirectoryPicker();
                
                const imageFiles = [];
                const maxImages = 50;
                let imageCount = 0;
                
                for await (const [name, handle] of directoryHandle.entries()) {
                    if (handle.kind === 'file' && isImageFile(name)) {
                        if (imageCount >= maxImages) {
                            break;
                        }
                        
                        const file = await handle.getFile();
                        imageFiles.push({
                            name: name,
                            file: file,
                            url: URL.createObjectURL(file)
                        });
                        imageCount++;
                    }
                }
                
                if (imageFiles.length === 0) {
                    alert('所选文件夹中没有图片文件');
                    return;
                }
                
                if (imageCount >= maxImages) {
                    alert(`所选文件夹中图片超过${maxImages}张，仅显示前${maxImages}张`);
                }
                
                sessionStorage.setItem('directSelectedImages', JSON.stringify(imageFiles));
                sessionStorage.setItem('selectedFolderName', directoryHandle.name);
                
                if (imageFiles.length <= 8) {
                    window.location.href = '/gallery-from-files';
                } else {
                    window.location.href = '/direct-gallery';
                }
            } catch (error) {
                console.error('选择文件夹失败:', error);
                if (error.name !== 'AbortError') {
                    alert('选择文件夹失败，请重试');
                }
            }
        }
        
        function isImageFile(fileName) {
            const lowerCaseFileName = fileName.toLowerCase();
            return lowerCaseFileName.endsWith('.jpg') ||
                   lowerCaseFileName.endsWith('.jpeg') ||
                   lowerCaseFileName.endsWith('.png') ||
                   lowerCaseFileName.endsWith('.gif') ||
                   lowerCaseFileName.endsWith('.bmp') ||
                   lowerCaseFileName.endsWith('.svg');
        }
    </script>
</body>
</html>
