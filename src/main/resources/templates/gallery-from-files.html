<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片预览系统 - 3D轮盘</title>
    <script src="/js/performance-monitor.js"></script>
    <script src="/js/image-optimizer.js"></script>

    <style>
        :root {
            --primary: #667eea;
            --success: #34C759;
            --danger: #FF453A;
            --bg: #0a0a0f;
            --surface: rgba(21, 21, 32, 0.7);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            user-select: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 16px;
            gap: 16px;
        }

        #loader .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        #loader .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
        }

        #bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(.4);
            transform: scale(1.1);
            z-index: -1;
            will-change: background-image;
        }

        .ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease-out;
            min-height: 36px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(255, 69, 58, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 69, 58, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 69, 58, 0.15);
            border-color: var(--danger);
        }

        .btn.active {
            background: linear-gradient(135deg, var(--success), #2ea352);
            color: #000;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4);
        }

        .btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 199, 89, 0.5);
        }

        .change-folder {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: linear-gradient(135deg, var(--primary), #5a6fd8);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            transition: all 200ms ease-out;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .change-folder:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        

        #stage {
            position: fixed;
            inset: 0;
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
            contain: layout style paint;
        }

        #world {
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .item {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 340px;
            height: 340px;
            margin: -170px;
            transform-style: preserve-3d;
            will-change: transform;
            backface-visibility: hidden;
        }

        .item .img-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,.6);
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .item img.loaded {
            opacity: 1;
        }

        .item .placeholder {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item .placeholder::after {
            content: '';
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #meta {
            position: fixed;
            bottom: 90px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 22px;
            opacity: .9;
        }

        .cinema-screen {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;

            opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            background: #000;
            cursor: pointer;
        }

        .cinema-screen.active { opacity: 1; visibility: visible; }

        .cinema-img {
            position: absolute;
            max-width: none;
            max-height: none;
            width: auto;
            height: auto;
            object-fit: contain;
            will-change: transform, opacity;

            opacity: 0;
            transition: opacity 0.3s ease-out;
            cursor: zoom-in;
        }

        .cinema-img.show { opacity: 1; }

        .cinema-img.zoomed { cursor: zoom-out; }

        .close-btn {
            position: absolute; top: 20px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3);
            color: white; font-size: 32px; font-weight: 300; line-height: 46px;
            text-align: center; cursor: pointer; z-index: 1002;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .close-btn:hover {
            background: rgba(0,0,0,0.8);
            border-color: rgba(255,255,255,0.6);
            transform: scale(1.05);
        }

        .low-memory-warning {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(255, 149, 0, 0.15);
            border: 1px solid rgba(255, 149, 0, 0.3);
            border-radius: 8px;
            padding: 10px 16px;
            color: #FF9500;
            font-size: 12px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .low-memory-warning.visible {
            opacity: 1;
        }
    </style>
</head>

<body>

<div id="loader">
    <span>Loading...</span>
    <div class="progress-bar"><div class="progress-fill" id="loadProgress"></div></div>
</div>
<div id="bg"></div>

<div class="ui-panel">
    📁 本地图片
    <span id="imageCount">0</span>
</div>

<div class="controls">
    <button id="btnAuto" class="btn active" onclick="toggleAuto()">停止播放</button>
    <button id="btnPreview" class="btn btn-secondary" onclick="togglePreview()">播放预览</button>
    <button class="btn btn-danger" onclick="location.href='/exit-to-home'">退出</button>
</div>

<a href="/direct-select-folder" class="change-folder">选择文件夹</a>

<div id="stage">
    <div id="world"></div>
</div>

<div id="meta"></div>

<div id="cinemaScreen" class="cinema-screen">
    <div class="close-btn" onclick="closeCinema()">×</div>
    <img id="cinemaImg" class="cinema-img" src="" draggable="false">
</div>

<script>
    let images = [];
    let total = 0;
    const world = document.getElementById('world');

    let currentPos = 0;
    let targetPos = 0;
    let velocity = 0;
    let isDragging = false;
    let isAuto = true;
    let isPreview = false;
    let isCinemaOpen = false;
    let playTimer = null;
    let cinemaTimer = null;

    let isPausing = false;
    let pauseTimer = 0;
    const PAUSE_TIME = 1200;

    const ITEM_WIDTH = 340;
    const GAP = 20;
    let radius = 500;

    const VISIBLE_THRESHOLD = 4;
    const PRELOAD_AHEAD = 2;
    
    let imageOptimizer;
    let performanceMonitor;
    let performanceOverlay;
    let initialized = false;

    async function init() {
        imageOptimizer = new ImageOptimizer();
        performanceMonitor = new PerformanceMonitor();
        performanceOverlay = new PerformanceOverlay(performanceMonitor);

        const directData = sessionStorage.getItem('directSelectedImages');
        
        if (directData) {
            images = JSON.parse(directData).map(img => ({
                name: img.name,
                url: img.url,
                loaded: false,
                compressedUrl: null,
                preloaded: false
            }));
            sessionStorage.removeItem('directSelectedImages');
            sessionStorage.removeItem('selectedFolderName');
        } else {
            location.href = '/gallery';
            return;
        }

        total = images.length;
        document.getElementById('imageCount').innerText = total;

        await preloadInitialImages();
        initScene();
        
        performanceMonitor.start();
        window.addEventListener('keydown', handleKeydown);
    }

    async function preloadInitialImages() {
        const loadProgress = document.getElementById('loadProgress');
        const urls = images.slice(0, VISIBLE_THRESHOLD + PRELOAD_AHEAD).map(img => img.url);
        
        await imageOptimizer.preloadImages(urls, {
            maxCount: VISIBLE_THRESHOLD + PRELOAD_AHEAD,
            onProgress: (progress) => {
                loadProgress.style.width = `${progress * 100}%`;
            }
        });
    }

    function initScene() {
        const perimeter = total * (ITEM_WIDTH + GAP);
        radius = Math.max(400, perimeter / (2 * Math.PI));

        for (let i = 0; i < total; i++) {
            const item = createItem(i);
            world.appendChild(item);
        }

        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').remove();
        }, 300);
        
        updateBg(0);
        requestAnimationFrame(animate);
        initialized = true;
    }

    function createItem(index) {
        const item = document.createElement('div');
        item.className = 'item';
        item.dataset.index = index;
        item.style.cursor = 'pointer';
        item.onclick = function() {
            openCinema(index);
        };
        
        const wrapper = document.createElement('div');
        wrapper.className = 'img-wrapper';
        
        const placeholder = document.createElement('div');
        placeholder.className = 'placeholder';
        wrapper.appendChild(placeholder);
        
        const img = document.createElement('img');
        img.dataset.originalUrl = images[index].url;
        wrapper.appendChild(img);
        
        item.appendChild(wrapper);
        return item;
    }

    function loadImageForIndex(index) {
        if (images[index].loaded) return;
        
        const item = world.children[index];
        if (!item) return;
        
        const img = item.querySelector('img');
        const placeholder = item.querySelector('.placeholder');
        
        const imgObj = new Image();
        imgObj.onload = () => {
            img.src = images[index].url;
            img.classList.add('loaded');
            images[index].loaded = true;
            
            if (placeholder) {
                placeholder.remove();
            }
        };
        
        imgObj.onerror = () => {
            if (placeholder) {
                placeholder.remove();
            }
        };
        
        imgObj.src = images[index].url;
    }

    function updateVisibleImages() {
        const centerIndex = Math.round(currentPos);
        
        for (let i = -VISIBLE_THRESHOLD; i <= VISIBLE_THRESHOLD; i++) {
            const idx = ((centerIndex + i) % total + total) % total;
            loadImageForIndex(idx);
        }
    }

    function animate(ts) {
        if (!animate.last) animate.last = ts;
        animate.last = ts;

        if (initialized) {
            performanceMonitor.tick();
        }

        if (isAuto && !isDragging) {
            targetPos += 0.003;
        }

        currentPos += (targetPos - currentPos) * 0.12;

        const diff = Math.abs(targetPos - currentPos);
        const snapped = diff < 0.01;

        if (!isAuto && !isDragging && snapped) {
            targetPos = Math.round(targetPos);
        }

        renderRing();
        updateCenter();
        updateMeta();
        updateVisibleImages();

        requestAnimationFrame(animate);
    }

    function renderRing() {
        const angle = currentPos * (360 / total);
        world.style.transform = `translateZ(-${radius}px) rotateY(${-angle}deg)`;

        const children = world.children;
        for (let i = 0; i < children.length; i++) {
            const item = children[i];
            const a = i * (360 / total);
            item.style.transform = `rotateY(${a}deg) translateZ(${radius}px)`;
        }
    }

    function updateCenter() {
        const pos = ((currentPos % total) + total) % total;
        const children = world.children;

        for (let i = 0; i < children.length; i++) {
            const item = children[i];
            let rawDiff = Math.abs(i - pos);
            const diff = Math.min(rawDiff, total - rawDiff);
            const t = Math.max(0, 1 - diff);
            const scale = 1 + 0.12 * t;
            item.style.transform = item.style.transform.replace(/\s*scale\([^)]*\)/, '') + ` scale(${scale.toFixed(4)})`;
        }
    }

    let lastX = 0;
    const stage = document.getElementById('stage');

    stage.addEventListener('mousedown', e => {
        isDragging = true;
        lastX = e.pageX;
        velocity = 0;
    });

    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const diff = e.pageX - lastX;
        lastX = e.pageX;
        targetPos += diff * 0.005;
        velocity = diff * 0.005;
    });

    window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        targetPos += velocity * 30;
    });

    window.addEventListener('wheel', e => {
        e.preventDefault();

        const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY)
            ? e.deltaX
            : e.deltaY;

        targetPos += delta * 0.005;
    }, { passive: false });

    function toggleAuto() {
        if (isAuto) {
            stopAutoRotate();
        } else {
            startAutoRotate();
        }
    }

    function updateBtn() {
        const btn = document.getElementById('btnAuto');
        btn.classList.toggle('active', isAuto);
        btn.classList.toggle('btn-secondary', !isAuto);
        btn.innerText = isAuto ? '停止播放' : '自动播放';
    }

    function startAutoRotate() {
        isAuto = true;
        updateBtn();
    }

    function stopAutoRotate() {
        isAuto = false;
        updateBtn();
    }

    function togglePreview() {
        if (isPreview) {
            stopPreview();
        } else {
            startPreview();
        }
    }

    function updatePreviewBtn() {
        const btn = document.getElementById('btnPreview');
        btn.classList.toggle('active', isPreview);
        btn.classList.toggle('btn-secondary', !isPreview);
        btn.innerText = isPreview ? '退出预览' : '播放预览';
    }

    async function startPreview() {
        isPreview = true;
        updatePreviewBtn();
        
        await preloadAllImagesForPreview();
        runPreviewStep();
    }

    async function preloadAllImagesForPreview() {
        const unloadedImages = images.filter(img => !img.preloaded);
        
        if (unloadedImages.length === 0) return;
        
        for (const imgData of unloadedImages) {
            await new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    imgData.preloaded = true;
                    resolve();
                };
                img.onerror = resolve;
                img.src = imgData.url;
            });
        }
    }

    function stopPreview() {
        isPreview = false;
        updatePreviewBtn();
        
        if (playTimer) {
            clearTimeout(playTimer);
            playTimer = null;
        }
        if (cinemaTimer) {
            clearTimeout(cinemaTimer);
            cinemaTimer = null;
        }
        
        const img = document.getElementById('cinemaImg');
        const screen = document.getElementById('cinemaScreen');
        
        requestAnimationFrame(() => {
            img.classList.remove('show');
            setTimeout(() => {
                screen.classList.remove('active');
            }, 300);
        });
    }

    function runPreviewStep() {
        if (!isPreview) return;

        const img = document.getElementById('cinemaImg');
        const screen = document.getElementById('cinemaScreen');

        const currentIndex = ((Math.round(targetPos) % total) + total) % total;

        playTimer = setTimeout(() => {
            if (!isPreview) return;

            const nextImg = new Image();
            nextImg.onload = () => {
                if (!isPreview) return;

                img.src = nextImg.src;
                img.style.width = '100vw';
                img.style.height = '100vh';
                img.style.objectFit = 'contain';
                img.style.transform = '';
                img.classList.remove('zoomed');

                requestAnimationFrame(() => {
                    screen.classList.add('active');
                    requestAnimationFrame(() => {
                        img.classList.add('show');

                        cinemaTimer = setTimeout(() => {
                            if (!isPreview) return;
                            img.classList.remove('show');

                            setTimeout(() => {
                                screen.classList.remove('active');
                                targetPos = targetPos + 1;
                                if (isPreview) {
                                    runPreviewStep();
                                }
                            }, 300);
                        }, 2000);
                    });
                });
            };
            nextImg.onerror = () => {
                if (!isPreview) return;
                img.src = images[currentIndex].url;
                img.style.width = '100vw';
                img.style.height = '100vh';
                img.style.objectFit = 'contain';
                img.style.transform = '';
                img.classList.remove('zoomed');

                requestAnimationFrame(() => {
                    screen.classList.add('active');
                    requestAnimationFrame(() => {
                        img.classList.add('show');

                        cinemaTimer = setTimeout(() => {
                            if (!isPreview) return;
                            img.classList.remove('show');

                            setTimeout(() => {
                                screen.classList.remove('active');
                                targetPos = targetPos + 1;
                                if (isPreview) {
                                    runPreviewStep();
                                }
                            }, 300);
                        }, 2000);
                    });
                });
            };
            nextImg.src = images[currentIndex].url;
        }, 200);
    }

    function updateBg(i) {
        const idx = ((i % total) + total) % total;
        if (images[idx] && images[idx].url) {
            document.getElementById('bg').style.backgroundImage = `url('${images[idx].url}')`;
        }
    }

    function updateMeta() {
        const idx = ((Math.round(currentPos) % total) + total) % total;
        document.getElementById('meta').innerText = images[idx] ? images[idx].name : '';
        updateBg(idx);
    }

    let cinemaScale = 1;
    let cinemaTranslateX = 0;
    let cinemaTranslateY = 0;
    let isDraggingCinema = false;
    let cinemaStartX = 0;
    let cinemaStartY = 0;

    function openCinema(index, isPreviewMode = false) {
        isCinemaOpen = true;
        const screen = document.getElementById('cinemaScreen');
        const img = document.getElementById('cinemaImg');

        cinemaScale = 1;
        cinemaTranslateX = 0;
        cinemaTranslateY = 0;

        img.src = images[index].url;
        img.onload = () => {
            fitImageToScreen(img);
        };
        screen.classList.add('active');

        setTimeout(() => img.classList.add('show'), 10);
    }

    function fitImageToScreen(img) {
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const imgWidth = img.naturalWidth;
        const imgHeight = img.naturalHeight;

        const scaleX = screenWidth / imgWidth;
        const scaleY = screenHeight / imgHeight;
        const scale = Math.min(scaleX, scaleY, 1);

        img.style.width = imgWidth + 'px';
        img.style.height = imgHeight + 'px';
        cinemaScale = scale;
        updateCinemaTransform();
    }

    function updateCinemaTransform() {
        const img = document.getElementById('cinemaImg');
        img.style.transform = `translate(${cinemaTranslateX}px, ${cinemaTranslateY}px) scale(${cinemaScale})`;

        if (cinemaScale > 1) {
            img.classList.add('zoomed');
        } else {
            img.classList.remove('zoomed');
        }
    }

    document.getElementById('cinemaImg').addEventListener('wheel', (e) => {
        if (!isCinemaOpen) return;
        e.preventDefault();

        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        const newScale = Math.max(0.5, Math.min(2, cinemaScale + delta));

        cinemaScale = newScale;
        updateCinemaTransform();
    }, { passive: false });

    document.getElementById('cinemaImg').addEventListener('mousedown', (e) => {
        if (!isCinemaOpen || cinemaScale <= 1) return;
        e.preventDefault();
        isDraggingCinema = true;
        cinemaStartX = e.clientX - cinemaTranslateX;
        cinemaStartY = e.clientY - cinemaTranslateY;
        e.target.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDraggingCinema) return;
        cinemaTranslateX = e.clientX - cinemaStartX;
        cinemaTranslateY = e.clientY - cinemaStartY;
        updateCinemaTransform();
    });

    window.addEventListener('mouseup', () => {
        if (isDraggingCinema) {
            isDraggingCinema = false;
            const img = document.getElementById('cinemaImg');
            img.style.cursor = cinemaScale > 1 ? 'zoom-out' : 'zoom-in';
        }
    });

    document.getElementById('cinemaImg').addEventListener('click', (e) => {
        if (!isCinemaOpen) return;
        e.stopPropagation();

        if (cinemaScale === 1) {
            cinemaScale = 1.5;
        } else {
            cinemaScale = 1;
            cinemaTranslateX = 0;
            cinemaTranslateY = 0;
        }
        updateCinemaTransform();
    });

    function closeCinema() {
        if (!isCinemaOpen && !isPreview) return;

        if (isPreview) {
            stopPreview();
            return;
        }

        isCinemaOpen = false;

        const screen = document.getElementById('cinemaScreen');
        const img = document.getElementById('cinemaImg');

        cinemaScale = 1;
        cinemaTranslateX = 0;
        cinemaTranslateY = 0;
        img.style.transform = '';
        img.classList.remove('zoomed');

        img.classList.remove('show');
        screen.classList.remove('active');
    }

    function togglePerformanceMonitor() {
        if (!performanceOverlay.container) {
            performanceOverlay.init();
        } else {
            performanceOverlay.toggle();
        }
    }

    function handleKeydown(e) {
        if (e.key === 'p' || e.key === 'P') {
            togglePerformanceMonitor();
        }
        if (e.key === 'Escape') {
            closeCinema();
        }
    }

    window.addEventListener('beforeunload', () => {
        if (performanceMonitor) {
            performanceMonitor.stop();
        }
        if (imageOptimizer) {
            imageOptimizer.clearCache();
        }
    });

    window.onload = init;
</script>

</body>
</html>
