<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片预览系统</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            user-select: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(.4);
            transform: scale(1.1);
            z-index: -1;
        }

        .ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(40,40,40,.55);
            backdrop-filter: blur(20px);
            padding: 10px 16px;
            border-radius: 12px;
            color: white;
            font-size: 13px;
            z-index: 1000;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn {
            background: rgba(255,255,255,.15);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 18px;
            cursor: pointer;
        }

        .btn.active {
            background: #34C759;
            color: #000;
            font-weight: 600;
        }

        .change-folder {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(52,199,89,.9);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
        }

        #stage {
            position: fixed;
            inset: 0;
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #world {
            position: relative;
            transform-style: preserve-3d;
        }

        .item {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 340px;
            height: 340px;
            margin: -170px;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,.6);
            pointer-events: none;
        }

        #meta {
            position: fixed;
            bottom: 90px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 22px;
            opacity: .9;
        }
    </style>
</head>

<body>

<div id="loader">Loading…</div>
<div id="bg"></div>

<div class="ui-panel">
    📁 <span th:text="${currentFolder}"></span>
    <span th:text="${images.size()}"></span>
</div>

<div class="controls">
    <button id="btnAuto" class="btn active" onclick="toggleAuto()">停止播放</button>
    <form action="/logout" method="post">
        <button class="btn">退出</button>
    </form>
</div>

<a href="/select-folder" class="change-folder">更换文件夹</a>

<div id="stage">
    <div id="world"></div>
</div>

<div id="meta"></div>

<script th:inline="javascript">
    const imgNames = [[${images}]];
    const total = imgNames.length;
    const world = document.getElementById('world');

    let currentPos = 0;
    let targetPos = 0;
    let velocity = 0;
    let isDragging = false;
    let isAuto = true;

    /* 自动停留 */
    let isPausing = false;
    let pauseTimer = 0;
    const PAUSE_TIME = 1200;

    const ITEM_WIDTH = 340;
    const GAP = 20;
    let radius = 500;

    /* 初始化 */
    window.onload = () => {
        imgNames.forEach(name => {
            const item = document.createElement('div');
            item.className = 'item';
            const img = new Image();
            img.src = '/images/' + encodeURIComponent(name);
            item.appendChild(img);
            world.appendChild(item);
        });

        const perimeter = total * (ITEM_WIDTH + GAP);
        radius = Math.max(400, perimeter / (2 * Math.PI));

        document.getElementById('loader').remove();
        updateBg(0);
        requestAnimationFrame(animate);
    };

    /* 主循环 */
    function animate(ts) {
        if (!animate.last) animate.last = ts;
        const dt = ts - animate.last;
        animate.last = ts;

        if (isAuto && !isPausing) {
            targetPos += 0.004;
        }

        currentPos += (targetPos - currentPos) * 0.12;

        const diff = Math.abs(targetPos - currentPos);
        const snapped = diff < 0.01;

        if (isAuto && snapped && !isPausing) {
            isPausing = true;
            pauseTimer = 0;
        }

        if (isPausing) {
            pauseTimer += dt;
            if (pauseTimer > PAUSE_TIME) {
                isPausing = false;
                targetPos = Math.round(targetPos) + 1;
            }
        }

        if (!isAuto && !isDragging && snapped) {
            targetPos = Math.round(targetPos);
        }

        renderRing();
        updateCenter();
        updateMeta();

        requestAnimationFrame(animate);
    }

    /* 渲染 */
    function renderRing() {
        const angle = currentPos * (360 / total);
        world.style.transform = `translateZ(-${radius}px) rotateY(${-angle}deg)`;

        [...world.children].forEach((item, i) => {
            const a = i * (360 / total);
            item.style.transform = `rotateY(${a}deg) translateZ(${radius}px)`;
        });
    }

    /* 中心放大 */
    function updateCenter() {
        const c = Math.round(currentPos);
        [...world.children].forEach((item, i) => {
            item.style.transform += Math.abs(i - c) < 0.5 ? ' scale(1.12)' : ' scale(1)';
        });
    }

    /* 拖拽 */
    let lastX = 0;
    const stage = document.getElementById('stage');

    stage.addEventListener('mousedown', e => {
        isDragging = true;
        isAuto = false;
        lastX = e.pageX;
        velocity = 0;
    });

    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const diff = e.pageX - lastX;
        lastX = e.pageX;
        targetPos += diff * 0.005;
        velocity = diff * 0.005;
    });

    window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        targetPos += velocity * 30;
    });

    /* ⚠️ 关键：Mac 触控板方向（这是最终正确版） */
    window.addEventListener('wheel', e => {
        e.preventDefault();

        const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY)
            ? e.deltaX
            : e.deltaY;

        /* ❗方向修正点 */
        targetPos += delta * 0.005;

        isAuto = false;
        updateBtn();
    }, { passive: false });

    function toggleAuto() {
        isAuto = !isAuto;
        updateBtn();
    }

    function updateBtn() {
        const btn = document.getElementById('btnAuto');
        btn.classList.toggle('active', isAuto);
        btn.innerText = isAuto ? '停止播放' : '自动播放';
    }

    function updateBg(i) {
        document.getElementById('bg').style.backgroundImage =
            `url('/images/${encodeURIComponent(imgNames[i])}')`;
    }

    function updateMeta() {
        const idx = ((Math.round(currentPos) % total) + total) % total;
        document.getElementById('meta').innerText = imgNames[idx];
        updateBg(idx);
    }
</script>

</body>
</html>
