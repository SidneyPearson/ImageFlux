<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式折叠画廊</title>
    <script src="/js/performance-monitor.js"></script>
    <script src="/js/image-optimizer.js"></script>
    
    <style>
        :root {
            --primary: #667eea;
            --success: #34C759;
            --danger: #FF453A;
            --bg: #0a0a0f;
            --surface: rgba(21, 21, 32, 0.8);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0; padding: 0; background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; height: 100vh; user-select: none;
        }

        #bg-blur {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.2); 
            transition: background-image 0.6s ease;
            transform: scale(1.1);
            will-change: background-image;
        }

        .header {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(10, 10, 15, 0.9), transparent);
            z-index: 500; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; box-sizing: border-box; transition: opacity 0.5s;
        }
        
        .header-title { 
            color: var(--text-secondary); 
            font-size: 14px; 
            letter-spacing: 1px;
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .controls {
            display: flex;
            gap: 10px;
        }

        .controls button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms ease-out;
            min-height: 36px;
            backdrop-filter: blur(10px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #5a6fd8);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-danger {
            background: rgba(255, 69, 58, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 69, 58, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 69, 58, 0.15);
            border-color: var(--danger);
        }

        .controls button.active { 
            background: linear-gradient(135deg, var(--success), #2ea352); 
            color: #000;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4);
        }

        .controls button.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 199, 89, 0.5);
        }

        .stage {
            position: absolute; inset: 0;
            perspective: 1200px; 
            display: flex; align-items: center; justify-content: center;
            contain: layout style paint;
        }

        .pool-container {
            position: relative; width: 0; height: 0;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .card {
            position: absolute;
            width: 460px; height: 345px; 
            top: -172px; left: -230px;
            
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            will-change: transform;
            cursor: pointer;
            -webkit-box-reflect: below 2px linear-gradient(transparent, transparent 60%, rgba(0,0,0,0.2));
            transition: opacity 0.3s;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            backface-visibility: hidden;
        }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 6px; pointer-events: none; opacity: 0; transition: opacity 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card img.loaded { opacity: 1; }

        .card.active img { 
            border-color: rgba(255,255,255,0.9); 
            filter: brightness(1.15); 
            box-shadow: 0 0 30px rgba(255,255,255,0.25);
        }

        .card .placeholder {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .card .placeholder::after {
            content: '';
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .cinema-screen {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
            
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            background: rgba(0,0,0,0.95); 
            cursor: pointer;
        }
        
        .cinema-screen.active { opacity: 1; visibility: visible; }

        .cinema-img {
            width: 95vw; height: 95vh;
            max-width: 100%; max-height: 100%;
            object-fit: contain; 
            
            transform: scale(0.95); opacity: 0;
            transition: transform 0.25s ease-out, opacity 0.25s;
            cursor: default; 
        }

        .cinema-img.show { opacity: 1; transform: scale(1); }

        .close-btn {
            position: absolute; top: 30px; right: 30px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 28px; font-weight: 300; line-height: 40px;
            text-align: center; cursor: pointer; z-index: 1002;
            transition: all 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }

        .info-bar {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            z-index: 500; transition: opacity 0.5s; pointer-events: none;
        }
        .file-name {
            color: #eee; font-size: 18px; font-weight: 300; margin-bottom: 10px;
            text-shadow: 0 2px 4px #000; font-family: monospace; opacity: 0.9;
        }
        .progress-bar {
            width: 30%; height: 3px; background: rgba(255,255,255,0.2); 
            margin: 0 auto; border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #fff; width: 0%; transition: width 0.1s;
        }

        

        body.auto-playing .header, 
        body.auto-playing .info-bar { opacity: 0; }
        body.auto-playing .stage { opacity: 0.3; transition: opacity 0.8s; } 

        
    </style>
</head>
<body>

<div id="bg-blur"></div>

<div class="header">
    <div class="header-title">
        <span id="folderInfo">Loading...</span>
    </div>
    <div class="controls">
        <button id="btnPlay" class="btn-primary" onclick="toggleAutoPlay()">▶ 自动轮播</button>
        <button class="btn-secondary" onclick="location.href='/direct-select-folder'">📂 选择文件夹</button>
        <button class="btn-danger" onclick="location.href='/exit-to-home'">退出</button>
    </div>
</div>

<div class="stage" id="stage">
    <div class="pool-container" id="pool"></div>
</div>

<div id="cinemaScreen" class="cinema-screen" onclick="closeCinema()">
    <div class="close-btn" onclick="closeCinema()">×</div>
    <img id="cinemaImg" class="cinema-img" src="" draggable="false" onclick="event.stopPropagation()">
</div>

<div class="info-bar" id="infoBar">
    <div class="file-name" id="fileName"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<script th:inline="javascript">
    const VISIBLE_COUNT = 12;
    const SPACING = 280;
    const DEPTH = 200;
    const ANGLE = 30;
    const Z_OFFSET = -100;

    let images = [];
    let total = 0;
    let currIndex = 0;
    let targetIndex = 0;
    let domPool = [];
    let folderName = '';
    
    let isAutoPlay = false;
    let isCinemaOpen = false;
    let playTimer = null;
    let cinemaTimer = null;
    let isDragging = false;
    let startX = 0;

    let imageOptimizer;
    let performanceMonitor;
    let performanceOverlay;
    let initialized = false;

    window.onload = function() {
        initImages();
    };

    async function initImages() {
        imageOptimizer = new ImageOptimizer();
        performanceMonitor = new PerformanceMonitor();
        performanceOverlay = new PerformanceOverlay(performanceMonitor);

        const directData = sessionStorage.getItem('directSelectedImages');
        const directFolderName = sessionStorage.getItem('selectedFolderName');
        
        const serverImages = [[${images}]];
        const serverFolder = [[${currentFolder}]];
        
        if (directData) {
            images = JSON.parse(directData);
            folderName = directFolderName || 'Selected Folder';
            sessionStorage.removeItem('directSelectedImages');
            sessionStorage.removeItem('selectedFolderName');
        } else if (serverImages && serverImages.length > 0) {
            images = serverImages.map(name => ({
                name: name,
                url: '/images/' + encodeURIComponent(name),
                loaded: false
            }));
            folderName = serverFolder ? serverFolder.split(/[\\/]/).pop() : 'Selected Folder';
        } else {
            location.href = '/direct-select-folder';
            return;
        }
        
        total = images.length;
        document.getElementById('folderInfo').innerText = `${folderName} (${total})`;

        createDomPool();
        await preloadVisibleImages();
        
        performanceMonitor.start();
        window.addEventListener('keydown', handleKeydown);
        
        requestAnimationFrame(renderLoop);
        bindEvents();
        updateBg(0);
        
        initialized = true;
    }

    async function preloadVisibleImages() {
        const urls = [];
        for (let i = 0; i < Math.min(VISIBLE_COUNT + 4, total); i++) {
            urls.push(images[i].url);
        }
        
        await imageOptimizer.preloadImages(urls, {
            maxCount: VISIBLE_COUNT + 4
        });
    }

    function createDomPool() {
        const container = document.getElementById('pool');
        container.innerHTML = '';
        domPool = [];

        for(let i = 0; i < VISIBLE_COUNT; i++) {
            const div = document.createElement('div');
            div.className = 'card';
            
            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder';
            div.appendChild(placeholder);
            
            const img = document.createElement('img');
            div.appendChild(img);
            
            div.onclick = (e) => {
                e.stopPropagation();
                const realIdx = parseInt(div.dataset.realIndex);
                if(isNaN(realIdx)) return;
                
                targetIndex = realIdx;
                stopAutoPlay();
                openCinema(realIdx);
            };
            
            container.appendChild(div);
            domPool.push({ el: div, img: img, currentSrc: null, placeholder: placeholder });
        }
    }

    function renderLoop() {
        if (initialized) {
            performanceMonitor.tick();
        }

        const diff = targetIndex - currIndex;
        if(Math.abs(diff) > 0.001) currIndex += diff * 0.12;
        else currIndex = targetIndex;

        const roundedIndex = Math.round(currIndex);

        domPool.forEach((item, poolIndex) => {
            let offset = (poolIndex - (roundedIndex % VISIBLE_COUNT));
            if (offset < -Math.floor(VISIBLE_COUNT/2)) offset += VISIBLE_COUNT;
            if (offset > Math.floor(VISIBLE_COUNT/2)) offset -= VISIBLE_COUNT;
            
            const realIndex = roundedIndex + offset;
            const dataIndex = getSafeIndex(realIndex);
            
            item.el.style.display = 'block';
            item.el.dataset.realIndex = realIndex;

            if (Math.abs(offset) < 6) {
                const imgUrl = images[dataIndex].url;
                if(item.currentSrc !== imgUrl) {
                    loadImageIntoCard(item, imgUrl);
                    item.currentSrc = imgUrl;
                }
            } else if (item.currentSrc !== null) {
                item.img.src = '';
                item.img.classList.remove('loaded');
                item.placeholder.style.display = 'flex';
                item.currentSrc = null;
            }

            const dist = realIndex - currIndex;
            const absDist = Math.abs(dist);
            const sign = dist > 0 ? 1 : -1;

            if (absDist > 4.2) {
                item.el.style.opacity = 0;
                item.el.style.pointerEvents = 'none';
            } else {
                item.el.style.opacity = 1;
                item.el.style.pointerEvents = 'auto';
            }

            let x = dist * SPACING;
            let z = Z_OFFSET - (absDist * DEPTH);
            let rY = 0;

            if (absDist >= 0.5) {
                x += sign * 80;
                rY = -sign * ANGLE;
            }

            item.el.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rY}deg)`;
            item.el.style.zIndex = 1000 - Math.round(absDist);

            if(absDist < 0.5) item.el.classList.add('active');
            else item.el.classList.remove('active');
        });

        updateUI(roundedIndex);
        requestAnimationFrame(renderLoop);
    }

    function loadImageIntoCard(item, url) {
        item.placeholder.style.display = 'flex';
        item.img.classList.remove('loaded');
        
        const cachedImg = imageOptimizer.getFromCache(url);
        if (cachedImg) {
            item.img.src = cachedImg.src || url;
            item.img.onload = () => {
                item.img.classList.add('loaded');
                item.placeholder.style.display = 'none';
            };
        } else {
            const imgObj = new Image();
            imgObj.onload = () => {
                item.img.src = url;
                item.img.classList.add('loaded');
                item.placeholder.style.display = 'none';
            };
            imgObj.onerror = () => {
                item.placeholder.style.display = 'none';
            };
            imgObj.src = url;
        }
    }

    function getSafeIndex(idx) {
        let safeIdx = Math.round(idx) % total;
        if(safeIdx < 0) safeIdx += total;
        return safeIdx;
    }

    function updateUI(idx) {
        const safeIdx = getSafeIndex(idx);
        document.getElementById('fileName').innerText = images[safeIdx].name;
        document.getElementById('progressFill').style.width = ((safeIdx / (total-1)) * 100) + '%';
        
        if(!isAutoPlay && !isCinemaOpen) updateBg(safeIdx);
    }
    
    let bgTimer;
    function updateBg(idx) {
        const safeIdx = getSafeIndex(idx);
        if(bgTimer) clearTimeout(bgTimer);
        bgTimer = setTimeout(() => {
            const bg = document.getElementById('bg-blur');
            if(images[safeIdx]) {
                const cached = imageOptimizer.getFromCache(images[safeIdx].url);
                const imgUrl = cached ? (cached.src || images[safeIdx].url) : images[safeIdx].url;
                bg.style.backgroundImage = `url('${imgUrl}')`;
            }
        }, 300);
    }

    function openCinema(idx) {
        isCinemaOpen = true;
        const screen = document.getElementById('cinemaScreen');
        const img = document.getElementById('cinemaImg');
        const safeIdx = getSafeIndex(idx);
        
        img.src = images[safeIdx].url;
        screen.classList.add('active');
        
        setTimeout(() => img.classList.add('show'), 10);
    }

    function closeCinema() {
        if (!isCinemaOpen) return;
        isCinemaOpen = false;
        
        const screen = document.getElementById('cinemaScreen');
        const img = document.getElementById('cinemaImg');

        img.classList.remove('show');
        screen.classList.remove('active');
        
        stopAutoPlay();
    }
    
    function toggleAutoPlay() { if(isAutoPlay) stopAutoPlay(); else startAutoPlay(); }

    function startAutoPlay() {
        isAutoPlay = true;
        document.body.classList.add('auto-playing');
        document.getElementById('btnPlay').innerText = "⏸ 停止";
        document.getElementById('btnPlay').classList.add('active');
        runAutoStep();
    }

    function stopAutoPlay() {
        isAutoPlay = false;
        document.body.classList.remove('auto-playing');
        document.getElementById('btnPlay').innerText = "▶ 自动轮播";
        document.getElementById('btnPlay').classList.remove('active');
        
        if(playTimer) clearTimeout(playTimer);
        if(cinemaTimer) clearTimeout(cinemaTimer);
        
        document.getElementById('cinemaImg').classList.remove('show');
        document.getElementById('cinemaScreen').classList.remove('active');
    }

    function runAutoStep() {
        if(!isAutoPlay) return;

        document.getElementById('cinemaImg').classList.remove('show');
        document.getElementById('cinemaScreen').classList.remove('active');

        targetIndex++;
        updateBg(targetIndex);

        playTimer = setTimeout(() => {
            if(!isAutoPlay) return;
            openCinema(targetIndex);
            
            cinemaTimer = setTimeout(() => {
                if(!isAutoPlay) return;
                document.getElementById('cinemaImg').classList.remove('show');
                
                setTimeout(() => {
                    if(isAutoPlay) {
                        document.getElementById('cinemaScreen').classList.remove('active');
                        runAutoStep();
                    }
                }, 300);

            }, 2000);

        }, 600);
    }

    function bindEvents() {
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                stopAutoPlay(); targetIndex++; if(isCinemaOpen) openCinema(targetIndex);
            }
            if(e.key === 'ArrowLeft') {
                stopAutoPlay(); targetIndex--; if(isCinemaOpen) openCinema(targetIndex);
            }
            if(e.key === 'Escape') closeCinema();
        });

        window.addEventListener('wheel', (e) => {
            if(isCinemaOpen) return;
            e.preventDefault();
            stopAutoPlay();
            let delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
            targetIndex += delta * 0.02;
        }, {passive: false});

        const stage = document.getElementById('stage');
        stage.addEventListener('mousedown', e => {
            if(isCinemaOpen) return;
            isDragging=true; startX=e.pageX; stopAutoPlay();
        });
        window.addEventListener('mousemove', e => {
            if(!isDragging || isCinemaOpen) return;
            targetIndex += (startX - e.pageX) * 0.005;
            startX = e.pageX;
        });
        window.addEventListener('mouseup', () => { isDragging=false; targetIndex=Math.round(targetIndex); });
    }

    function togglePerformanceMonitor() {
        if (!performanceOverlay.container) {
            performanceOverlay.init();
        } else {
            performanceOverlay.toggle();
        }
    }

    function handleKeydown(e) {
        if (e.key === 'p' || e.key === 'P') {
            togglePerformanceMonitor();
        }
    }

    window.addEventListener('beforeunload', () => {
        if (performanceMonitor) {
            performanceMonitor.stop();
        }
        if (imageOptimizer) {
            imageOptimizer.clearCache();
        }
    });
</script>
</body>
</html>
